### Skills [ skills ]
skills:
  title: "Professional Skills"
  subtitle: "my <b>Talent</b>"
  bg_title: "Skills"

  column1:
    items:
      - label: "Linux" #0-10 progress in dots
        text: "Ubuntu/Kali 기반 서버 구축 및 보안 설정, 시스템 관리 경험."
        value: "50" #0-100 progress in %

      - label: "Python" #0-10 progress in dots
        text: "네트워크 소켓 프로그래밍, 보안 자동화 스크립트 개발 경험."
        value: "25" #0-100 progress in %

  column2:
    items:
      - label: "Shell Script" #0-10 progress in dots
        text: "Bash 기반 시스템 자동화 및 로그 분석 스크립트 작성 경험."
        value: "15" #0-100 progress in %

      - label: "iptables" #0-10 progress in dots
        text: "방화벽 규칙 설정, 패킷 필터링 및 트래픽 제어 실습 경험."
        value: "60" #0-100 progress in %

  column3:
    items:
      - label: "Packet Tracer" #0-10 progress in dots
        text: "네트워크 토폴로지 설계 및 라우팅, 스위칭 프로토콜 실습 경험."
        value: "60" #0-100 progress in %

      - label: "Cloud" #0-10 progress in dots
        text: "클라우드 환경 기반 인프라 구성 및 보안 설정 경험."
        value: "60" #0-100 progress in %

