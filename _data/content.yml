        text: "네트워크 트래픽 캡처 및 패킷 분석 도구로 활용합니다."
        value: "75"

  column3:
    items:
      - label: "Burp Suite"
        text: "웹 애플리케이션 취약점 분석 및 프록시 기반 보안 점검에 사용합니다."
        value: "70"

      - label: "Nmap"
        text: "네트워크 스캐닝 및 포트 분석을 통한 공격 표면 파악에 활용합니다."
        value: "70"

### Resume [ resume ]
resume:
  title: "Resume"
  subtitle: "my <b>Story</b>"
  bg_title: "History"

  education:
    title: "Education &amp; Certification"
    items:
      - name: "한국폴리텍대학 강서캠퍼스"
        subname: "사이버보안과"
        period: "2025 - Present"
        text: "네트워크 보안, 시스템 해킹, 악성코드 분석 등 사이버 보안 전반을 전공하고 있습니다."

      - name: "네트워크관리사 2급"
        subname: "한국정보통신자격협회"
        period: "2025.12"
        text: "네트워크 설계, 운영 및 관리 능력을 검증하는 국가공인 자격증을 취득하였습니다."

      - name: "리눅스마스터 2급"
        subname: "한국정보통신진흥협회"
        period: "2025.10"
        text: "리눅스 시스템 운영 및 관리 역량을 검증하는 자격증을 취득하였습니다."

      - name: "공동주택IT안전관리사 2급"
        subname: "한국홈네트워크안전관리협회"
        period: "2025.09"
        text: "공동주택 IT 인프라의 보안 및 안전 관리 역량을 검증하는 자격증을 취득하였습니다."

  experience:
    title: "Experience"
    items:
      - name: "융합프로젝트 — PM"
        subname: "한국폴리텍대학 강서캠퍼스"
        period: "2026.03 - 2026.06"
        text: "북한OS 환경에서 백도어를 기반한 랜섬웨어 동작 구현 및 대응 프로젝트를 PM으로 담당, 보고서 작성 및 발표."

      - name: "동아리 &lt;White RootKit&gt;"
        subname: "보안 스터디 &amp; 프로젝트"
        period: "2026.01 - 2026.12"
        text: "iptables/Snort/IDS를 활용한 LLM AI 자동화 프로젝트 진행 및 VPN 구현. 방학 보안 스터디 참여."

      - name: "동계학술대회 논문 발표"
        subname: "한국컴퓨터정보학회"
        period: "2025.09 - 2025.12"
        text: "스타일 지문 기반 AI 저작권 보호 시스템 논문 작성 및 발표. 2026년 동계학술대회 논문집 제34권 1호 등재."

      - name: "만우조홍제스칼러십 홍보단 팀장"
        subname: "한국타이어나눔재단"
        period: "2025.08 - 2026.08"
        text: "기술인재 장학생으로 선발되어 홍보단 팀장으로 활동. 비전 워크숍 팀프로젝트 우수상 수상 (2025.08)."

      - name: "1학년 과대표"
        subname: "한국폴리텍대학 강서캠퍼스 사이버보안과"
        period: "2025.03 - 2025.12"
        text: "학과 학생 대표로 학사 일정 관리 및 학생-교수 간 소통 역할을 담당하였습니다."

