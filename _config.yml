# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

# basic settings
title: "한수현 - 사이버보안 전문가 블로그"
email: "hsh9120@naver.com"
description: "사이버보안 전문가로서의 여정을 담은 블로그입니다. 최신 보안 트렌드, 해킹 기술, 그리고 사이버 방어 전략에 대한 깊이 있는 분석과 실용적인 팁을 공유합니다. 함께 사이버 세계의 위협과 도전에 맞서며 안전한 디지털 환경을 만들어 나가요."
author: "한수현"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://Hansoohyeon.github.io" # the base hostname & protocol for your site, e.g. http://example.com
date_format: "%Y-%m-%d"

# paginations & permalinks
paginate: 6
paginate_path: "/blog/page:num/"
permalink: pretty

# disqus comments
disqus_comments: "yes" # yes - show disqus comments, no - hide disqus comments
disqus_shortname: "hansuhyeonyi-poteupolrio" # read more here https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-

# formsubmit.io
formspree_endpoint: "https://formspree.io/f/mlgoybdb" # sign up on https://formspree.io/ and create your form endpoint

# collections
collections:
  works:
    output: true
    permalink: /:collection/:name


# archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# Build settings
plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

sass:
  style: compressed

markdown:  kramdown
